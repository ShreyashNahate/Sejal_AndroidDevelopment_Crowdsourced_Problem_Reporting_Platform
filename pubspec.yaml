name: smartcity
description: Intelligent Civic Issue Reporting System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase (ONLY CORE + FIRESTORE)
  firebase_core: ^2.30.0
  cloud_firestore: ^4.17.5

  # Map
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # Camera & Image
  image_picker: ^1.1.2
  camera: ^0.10.5+9

  # Location
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # Voice (KEEP THIS)
  speech_to_text: ^7.0.0

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  flutter_rating_bar: ^4.0.1
  shimmer: ^3.0.0
  lottie: ^3.1.0

  # Utilities
  uuid: ^4.4.0
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  url_launcher: ^6.2.6
  connectivity_plus: ^6.0.3

  # State Management
  provider: ^6.1.2
  http: ^1.2.1
  flutter_tts: ^4.2.5

flutter:
  uses-material-design: true
  assets: []
 